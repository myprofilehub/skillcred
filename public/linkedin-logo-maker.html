<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { 
    width: 400px; 
    height: 400px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: white;
  }
  .circle {
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1e1b4b, #312e81);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 4px #6366f1;
  }
  .circle img {
    width: 200px;
    height: 200px;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="circle">
    <img src="/uploads/logoskillcred.PNG" alt="SkillCred Logo" />
  </div>
</body>
</html>
